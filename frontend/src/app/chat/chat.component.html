<button class="chat-fab" (click)="toggle()" aria-label="Toggle chat">
  💬
</button>

<div class="chat-panel" *ngIf="isOpen">
  <div class="chat-header">
    <span>GrindFlow AI</span>
    <button class="chat-close" (click)="toggle()" aria-label="Close chat">✕</button>
  </div>

  <div class="chat-messages">
    <div *ngIf="messages.length === 0" class="chat-empty">
      Ask me anything about your workouts, nutrition, or fitness goals.
    </div>
    <div *ngFor="let msg of messages"
         class="chat-msg"
         [class.user]="msg.role === 'user'"
         [class.bot]="msg.role === 'model'">
      <span *ngIf="msg.role === 'user'">{{ msg.content }}</span>
      <span *ngIf="msg.role === 'model'" [innerHTML]="msg.content | markdown"></span>
    </div>
    <div *ngIf="loading" class="chat-msg bot typing">Thinking...</div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="userInput"
      (keyup.enter)="send()"
      placeholder="Ask GrindFlow AI..."
      [disabled]="loading"
      aria-label="Chat message input" />
    <button (click)="send()" [disabled]="loading" aria-label="Send message">→</button>
  </div>
</div>
